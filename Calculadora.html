<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="Calculadora.css">
</head>
<body>
    <div class="contenedorCentrar">
        <div class="calculadora">
            <section class="pantalla">
                <p id="resultado"></p>
            </section>
            <section class="botones">
                <button class="numero">7</button>
                <button class="numero">8</button>
                <button class="numero">9</button>
                <button id="sumar">+</button>
                <button class="numero">4</button>
                <button class="numero">5</button>
                <button class="numero">6</button>
                <button id="restar">-</button>
                <button class="numero">1</button>
                <button class="numero">2</button>
                <button class="numero">3</button>
                <button id="multiplicar">x</button>
                <button class="numero boton_0">0</button>
                <button id="boton">.</button> 
                <button id="igualar">=</button>
                <button id="dividir">/</button>
            </section>
        </div>
        <section class="SeccionBotones">
            <button id="reiniciar">Reiniciar</button>
            <a href="./index.html">Volver al menu</a>
        </section>
    </div>


    <script src="Menu_Juegos.js"></script>
</body>
</html>
